services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
    container_name: w4lkies-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: w4lkies-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      SQLALCHEMY_DATABASE_URI: "postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-w4lkies}"
      PROJECT_NAME: "${PROJECT_NAME:-W4lkies API}"
      PROJECT_DESCRIPTION: "${PROJECT_DESCRIPTION:-FastAPI backend for W4lkies}"
      PROJECT_SUMMARY: "${PROJECT_SUMMARY:-Local development environment}"
      PROJECT_VERSION: "${PROJECT_VERSION:-0.1.0}"
      PROJECT_LICENSE: "${PROJECT_LICENSE:-Proprietary}"
      PROJECT_LICENSE_URL: "${PROJECT_LICENSE_URL:-https://example.com/license}"
      SECRET_KEY: "${SECRET_KEY:-change-me}"
      ALGORITHM: "${ALGORITHM:-HS256}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      ALLOW_ORIGINS: "${ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: w4lkies-database
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-w4lkies}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-w4lkies}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
